services:
  db:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: pcstore
      POSTGRES_PASSWORD: pcstore
      POSTGRES_DB: pcstore
    ports:
      - "5432:5432"
    volumes:
      - pcstore_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pcstore -d pcstore"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pcstore_db_data:
